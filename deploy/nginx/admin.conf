# Dashboard (Vite SPA, static) — /etc/nginx/sites-available/admin.conf
# Serves the pre-built dist/. SPA fallback so client-side routes work on refresh.
server {
    listen 80;
    server_name admin.example.com;

    root /var/www/aman/dashboard/dist;
    index index.html;

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: everything else falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
