# Backend (Laravel) — /etc/nginx/sites-available/api.conf
# ln -s to sites-enabled, then `certbot --nginx -d api.example.com` adds the 443 block.
server {
    listen 80;
    server_name api.example.com;

    root /var/www/aman/backend/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;   # allow file/image uploads (contacts, etc.)

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
