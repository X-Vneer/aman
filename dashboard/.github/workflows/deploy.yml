name: 🚀 Deploy to Server

on:
  push:
    branches:
      - main
      - staging

# Build + deploy in the same job so we never upload dist/ to GitHub Artifacts
# (avoids artifact storage quota on org accounts).

jobs:
  deploy-staging:
    name: 🚀 Staging — build & deploy (uat.admin.inaash.edu.sa)
    runs-on: ubuntu-latest
    if: github.ref_name == 'staging'
    steps:
      - name: Checkout repo (with token)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify checkout
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Files checked out:"
          ls -la | head -20
          echo "Source files exist:"
          test -f package.json && echo "✓ package.json exists" || echo "✗ package.json missing"
          test -f vite.config.ts && echo "✓ vite.config.ts exists" || echo "✗ vite.config.ts missing"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean previous build
        run: rm -rf dist node_modules/.vite

      - name: Install dependencies
        run: npm install --force

      - name: Build staging project
        run: npm run build
        env:
          AUTH_URL: HOSTNAME
          REACT_APP_TEXT: true
          VITE_API_BASE_URL: https://uat.api.inaash.edu.sa

      - name: Verify staging build files
        run: |
          echo "Build timestamp: $(date)"
          ls -lah dist/ | head -20

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Clean staging server directory (except .htaccess & .user.ini)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          'find /www/wwwroot/uat.admin.inaash.edu.sa/ -mindepth 1 -maxdepth 1 ! -name ".htaccess" ! -name ".user.ini" -exec rm -rf {} +'

      - name: Deploy to Staging Server
        run: |
          scp -o StrictHostKeyChecking=no -r dist/* ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/www/wwwroot/uat.admin.inaash.edu.sa/

  deploy-production:
    name: 🚀 Production — build & deploy (admin.inaash.edu.sa)
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    steps:
      - name: Checkout repo (with token)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Verify checkout
        run: |
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: $(git rev-parse HEAD)"
          echo "Files checked out:"
          ls -la | head -20
          echo "Source files exist:"
          test -f package.json && echo "✓ package.json exists" || echo "✗ package.json missing"
          test -f vite.config.ts && echo "✓ vite.config.ts exists" || echo "✗ vite.config.ts missing"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean previous build
        run: rm -rf dist node_modules/.vite

      - name: Install dependencies
        run: npm install --force

      - name: Build production project
        run: npm run build
        env:
          AUTH_URL: HOSTNAME
          REACT_APP_TEXT: true
          VITE_API_BASE_URL: https://api.inaash.edu.sa

      - name: Verify production build files
        run: |
          echo "Build timestamp: $(date)"
          ls -lah dist/ | head -20

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Clean production server directory (except .htaccess & .user.ini)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          'find /www/wwwroot/admin.inaash.edu.sa/ -mindepth 1 -maxdepth 1 ! -name ".htaccess" ! -name ".user.ini" -exec rm -rf {} +'

      - name: Deploy to Production Server
        run: |
          scp -o StrictHostKeyChecking=no -r dist/* ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/www/wwwroot/admin.inaash.edu.sa/
