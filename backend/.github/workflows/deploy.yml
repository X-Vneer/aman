name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # --- Production: api2.inaash.edu.sa ---
      - name: Copy changed folders to production
        run: |
          rsync -avz \
            --include='app/***' \
            --include='bootstrap/' \
            --include='bootstrap/app.php' \
            --include='bootstrap/providers.php' \
            --include='composer.json' \
            --include='composer.lock' \
            --include='config/***' \
            --include='database/***' \
            --include='lang/***' \
            --include='public/' \
            --include='public/js/***' \
            --include='resources/***' \
            --include='routes/***' \
            --include='tests/***' \
            --exclude='*' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/www/wwwroot/api2.inaash.edu.sa/

      - name: Run Laravel optimizations (production)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          'cd /www/wwwroot/api2.inaash.edu.sa && \
           composer install --no-dev --optimize-autoloader --no-interaction && \
           php artisan migrate --force && \
           php artisan config:cache && \
           php artisan route:clear && \
           php artisan route:cache && \
           php artisan view:cache && \
           (php artisan storage:link 2>/dev/null || true) && \
           chmod -R ug+rwx storage bootstrap/cache 2>/dev/null || chmod -R 775 storage bootstrap/cache'
